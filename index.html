<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miniature Game Tracker</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="./icon.png">

    <style>
        /* UI 및 폰트 통일 */
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2f3640;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --modal-bg: rgba(0, 0, 0, 0.85);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        /* 화면 전환용 클래스 */
        .screen { display: none; }
        .screen.active { display: block; }

        /* 공통 헤더 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dcdde1;
        }
        
        h1, h2, h3 { margin: 0; color: var(--primary-color); }

        /* 버튼 스타일 */
        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:active { background-color: #2980b9; }
        .btn-small { padding: 5px 10px; font-size: 14px; }
        .btn-outline { background-color: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); }
        .btn-warning { background-color: var(--warning-color); color: white; border: none; }
        .btn-warning:active { background-color: #d68910; }

        /* 리스트 및 카드 스타일 */
        .card {
            background-color: var(--card-bg);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #e8ecef;
        }
        .clickable-card { cursor: pointer; transition: transform 0.1s; }
        .clickable-card:active { transform: scale(0.98); }

        /* 저장된 팩션 리스트 아코디언 스타일 */
        .faction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 5px 0;
        }
        .faction-content {
            display: none; 
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .faction-content.active { display: block; }

        /* 팩션 룰 표시 박스 스타일 */
        .faction-rule-box {
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
        }

        /* 입력 폼 스타일 */
        textarea.u-textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
            resize: vertical; 
        }

        input.u-input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            font-size: 13px; 
            font-family: inherit;
        }

        /* 페이즈 아코디언 스타일 */
        .phase-header {
            background-color: var(--secondary-color);
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 5px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .phase-content {
            display: none;
            padding: 10px;
            background-color: white;
            border: 1px solid #dcdde1;
            border-radius: 0 0 6px 6px;
            margin-top: -5px;
            margin-bottom: 15px;
        }
        .phase-content.active { display: block; }

        /* 유닛 및 능력 리스트 아이템 */
        .unit-item {
            display: flex;
            align-items: flex-start; 
            padding: 10px;
            border-bottom: 1px solid #f1f2f6;
            transition: all 0.2s ease;
        }
        .unit-item:last-child { border-bottom: none; }
        
        .unit-checkbox {
            margin-right: 15px;
            margin-top: 5px; 
            transform: scale(1.5);
            cursor: pointer;
            flex-shrink: 0;
        }
        
        /* 이미지 썸네일 스타일 */
        .unit-thumb {
            width: 80px; 
            height: 80px; 
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
            margin-top: 5px;
            background-color: #ecf0f1;
            flex-shrink: 0;
            border: 1px solid #bdc3c7;
            cursor: pointer; 
        }

        .unit-details { flex-grow: 1; margin-top: 2px; }
        
        .unit-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            display: block;
            cursor: pointer;
            white-space: pre-wrap; 
            word-break: break-all; 
            color: var(--primary-color);
        }
        .unit-ability {
            font-size: 14px;
            color: #7f8fa6;
            white-space: pre-wrap; 
            word-break: break-all; 
            margin-bottom: 4px; 
        }
        .unit-equipment {
            font-size: 14px;
            color: #7f8fa6;
            white-space: pre-wrap; 
            word-break: break-all; 
            margin-bottom: 4px; 
        }

        /* 무기 정보 테이블 스타일 (아이콘 칸 추가됨) */
        .weapon-table {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 4px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            overflow: hidden;
            font-size: 13px;
        }
        .weapon-table-header {
            display: grid;
            grid-template-columns: 30px 3fr 1fr 1fr 1fr 2fr;
            background-color: #f1f2f6;
            padding: 6px 4px;
            text-align: center;
            font-weight: bold;
            color: #7f8fa6;
            font-size: 11px;
        }
        .weapon-table-row {
            display: grid;
            grid-template-columns: 30px 3fr 1fr 1fr 1fr 2fr;
            padding: 8px 4px;
            text-align: center;
            align-items: center;
            word-break: break-all;
            background-color: #ffffff;
            border-top: 1px solid #f1f2f6;
        }
        
        /* 사진 첨부 버튼 스타일 */
        .file-upload-label {
            display: inline-block;
            background-color: #ecf0f1;
            color: var(--primary-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            border: 1px solid #bdc3c7;
        }
        .file-upload-label:active { background-color: #bdc3c7; }

        /* 모달 공통 */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-bg);
            z-index: 9999; 
            justify-content: center;
            align-items: center;
        }
        #imageModal { cursor: pointer; }
        #modalImage {
            max-width: 90%; max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
        }

        .code-modal-box {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="imageModal" class="modal-overlay" onclick="closeImageModal()">
    <img id="modalImage" src="" alt="유닛 확대 이미지">
</div>

<div id="codeModal" class="modal-overlay">
    <div class="code-modal-box">
        <h3 id="codeModalTitle" style="margin-top:0; color:var(--primary-color);">코드 복사/붙여넣기</h3>
        <p id="codeModalDesc" style="font-size:13px; color:#7f8fa6; margin-bottom:10px;"></p>
        <textarea id="codeModalText" class="u-textarea" rows="6" style="font-family:monospace; font-size:12px; margin-bottom:15px;"></textarea>
        <div style="display:flex; gap:10px;">
            <button id="codeModalActionBtn" class="btn" style="flex:1;">실행</button>
            <button class="btn btn-outline" style="flex:1;" onclick="closeCodeModal()">닫기</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="screen-home" class="screen active">
        <div class="header">
            <h1>Game Tracker</h1>
        </div>
        
        <div class="card clickable-card" onclick="navToGame('spearhead')">
            <h2>Spearhead</h2>
            <p style="margin:5px 0 0; color:#7f8fa6; font-size:14px;">팩션 리스트 보기</p>
        </div>
        
        <div class="card clickable-card" onclick="navToGame('killteam')">
            <h2>Kill Team</h2>
            <p style="margin:5px 0 0; color:#7f8fa6; font-size:14px;">오퍼레이티브 및 무기 정보 리스트 보기</p>
        </div>

        <div class="card disabled">Warhammer 40,000 (준비 중)</div>
        <div class="card disabled">Age of Sigmar (준비 중)</div>
        <div class="card disabled">Obsidian Protocol (준비 중)</div>
    </div>

    <div id="screen-list" class="screen">
        <div class="header">
            <button class="btn btn-outline" onclick="navTo('screen-home')">◀ 메인</button>
            <h2 id="list-game-title">Game Title</h2>
            <div style="display:flex; gap:5px;">
                <button class="btn btn-outline" style="padding:8px 10px; font-size:14px;" onclick="openImportModal()">⬇️ 불러오기</button>
                <button class="btn" style="padding:8px 10px; font-size:14px;" onclick="navTo('screen-edit')">＋ 추가</button>
            </div>
        </div>
        <div id="faction-list-container">
            </div>
    </div>

    <div id="screen-edit" class="screen">
        <div class="header">
            <button class="btn btn-outline" onclick="navTo('screen-list')">취소</button>
            <h2 id="edit-title">새 리스트 추가</h2>
            <button class="btn" onclick="saveFaction()">저장</button>
        </div>
        
        <label for="factionName" style="font-weight:bold;">팩션(팀) 이름 <span style="color:red">*</span></label>
        <textarea id="factionName" class="u-textarea" placeholder="이름을 입력하세요" rows="2"></textarea>

        <div id="killteam-rule-section" style="display:none;">
            <label for="factionRule" style="font-weight:bold; display:block; margin-top:5px;">팩션 룰</label>
            <textarea id="factionRule" class="u-textarea" placeholder="간단한 팩션 룰을 적어주세요 (엔터로 줄바꿈 가능)" rows="3"></textarea>
        </div>

        <div style="margin-top: 20px;">
            <h3 id="phase-settings-title">페이즈별 유닛 및 능력 설정</h3>
            <p style="font-size:12px; color:#e74c3c; margin-top:5px; font-weight:bold;">※ 유닛 이름만 필수이며, 나머지는 비워두셔도 됩니다.</p>
        </div>

        <div id="phases-container">
            </div>
    </div>
</div>

<script>
    const gameConfig = {
        spearhead: {
            title: "Spearhead",
            phases: ["히어로페이즈", "무브페이즈", "사격페이즈", "차지페이즈", "어택페이즈", "엔드페이즈"],
            settingTitle: "페이즈별 유닛 및 능력 설정"
        },
        killteam: {
            title: "Kill Team",
            phases: ["Scouting Phase", "Initiative Phase", "Strategy Phase", "Firefight Phase"],
            settingTitle: "터닝페이즈 별 유닛 장비 및 능력 설정"
        }
    };

    let currentData = {};
    let savedFactions = [];
    let editingIndex = -1; 
    let openFactions = new Set(); 
    
    let currentGameKey = ''; 
    let currentPhases = []; 
    let tempImages = {}; 

    // --- 드래그 앤 드롭 함수 ---
    let draggedItem = null;

    function dragStart(e, phase, index) {
        draggedItem = { phase: phase, index: index };
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index);
        setTimeout(() => { e.target.style.opacity = '0.4'; }, 0);
    }

    function dragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    }

    function drop(e, targetPhase, targetIndex) {
        e.preventDefault();
        e.target.style.opacity = '1';
        
        if (draggedItem && draggedItem.phase === targetPhase && draggedItem.index !== targetIndex) {
            const arr = currentData[targetPhase];
            const itemToMove = arr.splice(draggedItem.index, 1)[0];
            arr.splice(targetIndex, 0, itemToMove);
            renderUnitsInEdit(targetPhase);
        }
        draggedItem = null;
    }

    function dragEnd(e) {
        e.target.style.opacity = '1';
        draggedItem = null;
    }

    // --- 화살표 순서 변경 함수 ---
    function moveUnitUp(phase, index) {
        if (index > 0) {
            const arr = currentData[phase];
            const temp = arr[index];
            arr[index] = arr[index - 1];
            arr[index - 1] = temp;
            renderUnitsInEdit(phase);
        }
    }

    function moveUnitDown(phase, index) {
        const arr = currentData[phase];
        if (index < arr.length - 1) {
            const temp = arr[index];
            arr[index] = arr[index + 1];
            arr[index + 1] = temp;
            renderUnitsInEdit(phase);
        }
    }


    // --- 무기 & AP 다중 추가를 위한 HTML 생성 함수 (아이콘 추가됨) ---
    function addApRow(phase, value = '') {
        const container = document.getElementById(`ap-container-${phase}`);
        const div = document.createElement('div');
        div.style.position = 'relative';
        div.innerHTML = `
            <textarea class="u-textarea ap-input" placeholder="ap 능력 (선택)" rows="2" style="margin-bottom:5px; padding-right:30px;">${value}</textarea>
            <button class="btn-small" style="position:absolute; right:5px; top:5px; background-color:var(--danger-color); color:white; border:none; padding:4px; border-radius:4px;" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }

    function addWeaponRow(phase, wep = {type:'🔫', name:'', atk:'', hit:'', dmg:'', wr:''}) {
        const container = document.getElementById(`weapon-container-${phase}`);
        const div = document.createElement('div');
        div.className = 'weapon-input-row';
        div.style.display = 'grid';
        // 아이콘 선택(45px) 추가된 그리드
        div.style.gridTemplateColumns = '45px 3fr 1fr 1fr 1fr 2fr 30px';
        div.style.gap = '4px';
        div.style.marginBottom = '4px';
        div.style.alignItems = 'center';
        
        div.innerHTML = `
            <select class="u-input wep-type" style="padding:0; text-align:center; font-size:16px; cursor:pointer;">
                <option value="🔫" ${wep.type === '🔫' ? 'selected' : ''}>🔫</option>
                <option value="🗡️" ${wep.type === '🗡️' ? 'selected' : ''}>🗡️</option>
            </select>
            <input type="text" class="u-input wep-name" placeholder="무기명" value="${wep.name}">
            <input type="text" class="u-input wep-atk" placeholder="A" style="text-align:center;" value="${wep.atk}">
            <input type="text" class="u-input wep-hit" placeholder="H" style="text-align:center;" value="${wep.hit}">
            <input type="text" class="u-input wep-dmg" placeholder="D" style="text-align:center;" value="${wep.dmg}">
            <input type="text" class="u-input wep-wr" placeholder="규칙" value="${wep.wr}">
            <button class="btn-small" style="background-color:var(--danger-color); color:white; border:none; padding:4px; border-radius:4px;" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(div);
    }

    function navTo(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');

        if (screenId === 'screen-edit') {
            editingIndex = -1; 
            document.getElementById('edit-title').innerText = "새 리스트 추가";
            initEditScreen();
        } else if (screenId === 'screen-list') {
            renderFactionList();
        }
    }

    function navToGame(gameKey) {
        currentGameKey = gameKey;
        const config = gameConfig[gameKey];
        
        currentPhases = config.phases;
        savedFactions = JSON.parse(localStorage.getItem(currentGameKey + '_factions')) || [];
        openFactions.clear(); 
        
        document.getElementById('list-game-title').innerText = config.title;
        document.getElementById('phase-settings-title').innerText = config.settingTitle;
        
        navTo('screen-list');
    }

    function openImageModal(imgSrc) {
        if(!imgSrc) return;
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        modalImg.src = imgSrc;
        modal.style.display = 'flex';
    }

    function closeImageModal() {
        document.getElementById('imageModal').style.display = 'none';
        document.getElementById('modalImage').src = '';
    }

    function exportSingleFaction(index) {
        const factionData = savedFactions[index];
        const exportObj = { game: currentGameKey, data: factionData };
        const code = btoa(encodeURIComponent(JSON.stringify(exportObj)));
        
        document.getElementById('codeModalTitle').innerText = '🚀 리스트 공유(코드)';
        document.getElementById('codeModalDesc').innerText = '아래 코드를 복사하여 친구에게 주거나 다른 기기에서 불러오세요.';
        
        const textArea = document.getElementById('codeModalText');
        textArea.value = code;
        textArea.readOnly = true;
        
        const actionBtn = document.getElementById('codeModalActionBtn');
        actionBtn.innerText = '📋 복사하기';
        actionBtn.style.backgroundColor = '#27ae60';
        actionBtn.onclick = function() {
            textArea.select();
            document.execCommand('copy');
            alert('코드가 클립보드에 복사되었습니다!');
            closeCodeModal();
        };
        
        document.getElementById('codeModal').style.display = 'flex';
    }

    function openImportModal() {
        document.getElementById('codeModalTitle').innerText = '⬇️ 리스트 불러오기';
        document.getElementById('codeModalDesc').innerText = '복사해온 리스트 코드를 아래에 붙여넣어 추가하세요. (기존 리스트는 지워지지 않습니다!)';
        
        const textArea = document.getElementById('codeModalText');
        textArea.value = '';
        textArea.readOnly = false;
        textArea.placeholder = '여기에 코드를 붙여넣으세요...';
        
        const actionBtn = document.getElementById('codeModalActionBtn');
        actionBtn.innerText = '추가하기';
        actionBtn.style.backgroundColor = 'var(--accent-color)';
        actionBtn.onclick = function() {
            const code = textArea.value.trim();
            if(!code) { alert('코드를 입력하세요.'); return; }
            try {
                const jsonStr = decodeURIComponent(atob(code));
                const importObj = JSON.parse(jsonStr);
                
                if(importObj.game !== currentGameKey) {
                    alert(`⚠️ 올바르지 않은 코드입니다. 이 코드는 [${importObj.game}] 게임용 리스트입니다.`);
                    return;
                }
                
                importObj.data.id = Date.now();
                savedFactions.push(importObj.data);
                localStorage.setItem(currentGameKey + '_factions', JSON.stringify(savedFactions));
                
                renderFactionList();
                closeCodeModal();
                alert(`'${importObj.data.name}' 리스트가 성공적으로 추가되었습니다!`);
            } catch(e) {
                alert('유효하지 않은 코드입니다. 코드가 전부 올바르게 복사되었는지 확인해주세요.');
            }
        };
        
        document.getElementById('codeModal').style.display = 'flex';
    }

    function closeCodeModal() {
        document.getElementById('codeModal').style.display = 'none';
    }

    function editFaction(index) {
        editingIndex = index;
        const faction = savedFactions[index];
        
        currentData = JSON.parse(JSON.stringify(faction.phases));
        
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('screen-edit').classList.add('active');
        
        document.getElementById('edit-title').innerText = "리스트 수정";
        document.getElementById('factionName').value = faction.name;
        document.getElementById('factionRule').value = faction.rule || '';
        
        if(currentGameKey === 'killteam') {
            document.getElementById('killteam-rule-section').style.display = 'block';
        } else {
            document.getElementById('killteam-rule-section').style.display = 'none';
        }
        
        tempImages = {}; 
        renderPhases();
    }

    function initEditScreen() {
        document.getElementById('factionName').value = '';
        document.getElementById('factionRule').value = '';
        
        if(currentGameKey === 'killteam') {
            document.getElementById('killteam-rule-section').style.display = 'block';
        } else {
            document.getElementById('killteam-rule-section').style.display = 'none';
        }

        currentData = {};
        tempImages = {}; 
        currentPhases.forEach(p => currentData[p] = []); 
        renderPhases();
    }

    function renderPhases() {
        const container = document.getElementById('phases-container');
        container.innerHTML = '';

        currentPhases.forEach(phase => {
            const phaseWrapper = document.createElement('div');
            
            const header = document.createElement('div');
            header.className = 'phase-header';
            header.innerHTML = `<span>${phase}</span> <span>▼</span>`;
            header.onclick = () => togglePhase(content);

            const content = document.createElement('div');
            content.className = 'phase-content';
            content.id = `content-${phase}`;

            const unitList = document.createElement('div');
            unitList.id = `list-${phase}`;
            
            const inputArea = document.createElement('div');
            inputArea.style.marginTop = '10px';
            inputArea.style.paddingTop = '10px';
            inputArea.style.borderTop = '1px dashed #ccc';
            
            let baseInputHTML = `
                <textarea id="unitName-${phase}" class="u-textarea" placeholder="유닛 이름 (필수)" rows="1" style="margin-bottom:5px; border-color:var(--accent-color);"></textarea>
                <textarea id="unitAbility-${phase}" class="u-textarea" placeholder="사용할 능력 (선택)" rows="2" style="margin-bottom:5px;"></textarea>
            `;

            let equipmentInputHTML = '';
            if(currentGameKey === 'killteam' && phase === 'Firefight Phase') {
                equipmentInputHTML = `
                    <div style="background-color: #f8f9fa; border: 1px solid #dcdde1; border-radius: 6px; padding: 10px; margin-bottom: 10px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                            <strong style="font-size:13px; color:var(--primary-color);">[AP 능력 (선택)]</strong>
                            <button class="btn-small btn-outline" style="padding:2px 8px; font-size:11px;" onclick="addApRow('${phase}')">＋ 추가</button>
                        </div>
                        <div id="ap-container-${phase}">
                            </div>
                    </div>
                    
                    <div style="background-color: #f8f9fa; border: 1px solid #dcdde1; border-radius: 6px; padding: 10px; margin-bottom: 10px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                            <strong style="font-size:13px; color:var(--primary-color);">[무기 정보 (선택)]</strong>
                            <button class="btn-small btn-outline" style="padding:2px 8px; font-size:11px;" onclick="addWeaponRow('${phase}')">＋ 추가</button>
                        </div>
                        <div style="display: grid; grid-template-columns: 45px 3fr 1fr 1fr 1fr 2fr 30px; gap: 4px; text-align: center; font-size: 11px; font-weight: bold; color: #7f8fa6; margin-bottom: 2px;">
                            <div>Type</div><div>Name</div><div>ATK</div><div>HIT</div><div>DMG</div><div>WR</div><div></div>
                        </div>
                        <div id="weapon-container-${phase}">
                            </div>
                    </div>
                `;
            }

            inputArea.innerHTML = `
                ${baseInputHTML}
                ${equipmentInputHTML}
                
                <div style="display:flex; align-items:center; margin-bottom:15px; gap: 10px;">
                    <label class="file-upload-label">
                        📷 사진 첨부 (선택)
                        <input type="file" id="unitImage-${phase}" accept="image/*" capture="environment" style="display:none;" onchange="handleImageSelect(event, '${phase}')">
                    </label>
                    <img id="preview-${phase}" src="" style="display:none; width:40px; height:40px; object-fit:cover; border-radius:5px; border:1px solid #ccc;">
                    <span id="preview-text-${phase}" style="font-size:12px; color:#7f8fa6; display:none;">준비됨!</span>
                </div>

                <button class="btn btn-small" onclick="addUnit('${phase}')" style="width:100%">+ 이 페이즈에 추가</button>
            `;

            content.appendChild(unitList);
            content.appendChild(inputArea);
            
            phaseWrapper.appendChild(header);
            phaseWrapper.appendChild(content);
            container.appendChild(phaseWrapper);

            if(currentGameKey === 'killteam' && phase === 'Firefight Phase') {
                addApRow(phase);
                addWeaponRow(phase);
            }

            renderUnitsInEdit(phase);
        });
    }

    function togglePhase(element) {
        element.classList.toggle('active');
    }

    function toggleFactionContent(index) {
        const content = document.getElementById(`faction-content-${index}`);
        const icon = document.getElementById(`faction-icon-${index}`);
        
        content.classList.toggle('active');
        
        if (content.classList.contains('active')) {
            icon.innerText = '▲';
            openFactions.add(index);
        } else {
            icon.innerText = '▼';
            openFactions.delete(index);
        }
    }

    function handleImageSelect(event, phase) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 150; 
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                } else {
                    if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                tempImages[phase] = compressedBase64;

                const preview = document.getElementById(`preview-${phase}`);
                const previewText = document.getElementById(`preview-text-${phase}`);
                preview.src = compressedBase64;
                preview.style.display = 'block';
                previewText.style.display = 'inline-block';
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    function addUnit(phase) {
        const nameInput = document.getElementById(`unitName-${phase}`);
        const abilityInput = document.getElementById(`unitAbility-${phase}`);
        
        if (!nameInput.value.trim()) {
            alert('유닛 이름은 필수입니다.');
            nameInput.focus();
            return;
        }

        if (!currentData[phase]) currentData[phase] = [];

        let unitData = {
            name: nameInput.value.trim(),
            ability: abilityInput.value.trim(),
            image: tempImages[phase] || null, 
            checked: false
        };

        if(currentGameKey === 'killteam' && phase === 'Firefight Phase') {
            unitData.apAbilities = [];
            const apContainer = document.getElementById(`ap-container-${phase}`);
            if(apContainer) {
                const apInputs = apContainer.querySelectorAll('.ap-input');
                apInputs.forEach(input => {
                    if(input.value.trim()) unitData.apAbilities.push(input.value.trim());
                });
            }

            unitData.weapons = [];
            const weaponContainer = document.getElementById(`weapon-container-${phase}`);
            if(weaponContainer) {
                const weaponRows = weaponContainer.querySelectorAll('.weapon-input-row');
                weaponRows.forEach(row => {
                    // 아이콘(타입) 수집 추가됨
                    const type = row.querySelector('.wep-type').value;
                    const name = row.querySelector('.wep-name').value.trim();
                    const atk = row.querySelector('.wep-atk').value.trim();
                    const hit = row.querySelector('.wep-hit').value.trim();
                    const dmg = row.querySelector('.wep-dmg').value.trim();
                    const wr = row.querySelector('.wep-wr').value.trim();
                    
                    if(name || atk || hit || dmg || wr) {
                        unitData.weapons.push({type, name, atk, hit, dmg, wr});
                    }
                });
            }
        }

        currentData[phase].push(unitData);

        nameInput.value = '';
        abilityInput.value = '';
        
        if(currentGameKey === 'killteam' && phase === 'Firefight Phase') {
            document.getElementById(`ap-container-${phase}`).innerHTML = '';
            document.getElementById(`weapon-container-${phase}`).innerHTML = '';
            addApRow(phase);
            addWeaponRow(phase);
        }
        
        tempImages[phase] = null;
        
        const fileInput = document.getElementById(`unitImage-${phase}`);
        if(fileInput) fileInput.value = '';
        document.getElementById(`preview-${phase}`).style.display = 'none';
        document.getElementById(`preview-text-${phase}`).style.display = 'none';
        
        renderUnitsInEdit(phase);
    }

    function editUnitItem(phase, index) {
        const item = currentData[phase][index];
        
        document.getElementById(`unitName-${phase}`).value = item.name || '';
        document.getElementById(`unitAbility-${phase}`).value = item.ability || '';
        
        if(currentGameKey === 'killteam' && phase === 'Firefight Phase') {
            const apContainer = document.getElementById(`ap-container-${phase}`);
            if(apContainer) {
                apContainer.innerHTML = '';
                let apList = item.apAbilities || [];
                if(item.equipment) apList.push(item.equipment); 
                if(apList.length === 0) apList = [''];
                apList.forEach(ap => addApRow(phase, ap));
            }

            const wepContainer = document.getElementById(`weapon-container-${phase}`);
            if(wepContainer) {
                wepContainer.innerHTML = '';
                let wepList = item.weapons || [];
                // 이전 버전 호환 처리 시 기본 아이콘 부여
                if(item.wepName || item.wepAtk || item.wepHit || item.wepDmg || item.wepWr) {
                    wepList.push({type: item.wepType||'🔫', name: item.wepName||'', atk: item.wepAtk||'', hit: item.wepHit||'', dmg: item.wepDmg||'', wr: item.wepWr||''});
                }
                if(wepList.length === 0) wepList = [{type:'🔫', name:'', atk:'', hit:'', dmg:'', wr:''}];
                wepList.forEach(w => addWeaponRow(phase, w));
            }
        }

        if(item.image) {
            tempImages[phase] = item.image;
            document.getElementById(`preview-${phase}`).src = item.image;
            document.getElementById(`preview-${phase}`).style.display = 'block';
            document.getElementById(`preview-text-${phase}`).style.display = 'inline-block';
        } else {
            tempImages[phase] = null;
            document.getElementById(`preview-${phase}`).style.display = 'none';
            document.getElementById(`preview-text-${phase}`).style.display = 'none';
        }

        currentData[phase].splice(index, 1);
        renderUnitsInEdit(phase);
        
        document.getElementById(`unitName-${phase}`).focus();
    }

    function renderUnitsInEdit(phase) {
        const listContainer = document.getElementById(`list-${phase}`);
        listContainer.innerHTML = '';
        
        if(currentData[phase]) {
            currentData[phase].forEach((item, index) => {
                const imgTag = item.image ? `<img src="${item.image}" class="unit-thumb" onclick="openImageModal('${item.image}')">` : '';
                let abilityHTML = item.ability ? `<div class="unit-ability">${item.ability}</div>` : '';
                let equipmentHTML = '';
                let weaponHTML = '';

                if(currentGameKey === 'killteam' && phase === 'Firefight Phase') {
                    let apArray = item.apAbilities || [];
                    if (item.equipment) apArray.push(item.equipment);
                    
                    if (apArray.length > 0) {
                        equipmentHTML = apArray.map(ap => `<div class="unit-equipment"><strong style="color: var(--primary-color);">[AP 능력]</strong> ${ap}</div>`).join('');
                    }
                    
                    let wepArray = item.weapons || [];
                    if(item.wepName || item.wepAtk || item.wepHit || item.wepDmg || item.wepWr) {
                        wepArray.push({type: item.wepType||'🔫', name: item.wepName, atk: item.wepAtk, hit: item.wepHit, dmg: item.wepDmg, wr: item.wepWr});
                    }

                    if (wepArray.length > 0) {
                        weaponHTML = `
                            <div class="weapon-table">
                                <div class="weapon-table-header">
                                    <div></div><div>Name</div><div>ATK</div><div>HIT</div><div>DMG</div><div>WR</div>
                                </div>
                                ${wepArray.map(w => `
                                <div class="weapon-table-row">
                                    <div style="font-size:16px;">${w.type || '🔫'}</div>
                                    <div style="font-weight:bold; text-align:left; padding-left:4px;">${w.name || '-'}</div>
                                    <div>${w.atk || '-'}</div>
                                    <div>${w.hit || '-'}</div>
                                    <div>${w.dmg || '-'}</div>
                                    <div style="font-size:11px;">${w.wr || '-'}</div>
                                </div>
                                `).join('')}
                            </div>
                        `;
                    }
                }

                listContainer.innerHTML += `
                    <div class="unit-item" draggable="true" 
                         ondragstart="dragStart(event, '${phase}', ${index})" 
                         ondragover="dragOver(event)" 
                         ondrop="drop(event, '${phase}', ${index})" 
                         ondragend="dragEnd(event)">
                         
                        <div style="display:flex; align-items:center; padding-right:10px; color:#bdc3c7; cursor:grab; font-size:24px; font-weight:normal;">≡</div>
                        
                        ${imgTag}
                        
                        <div class="unit-details">
                            <div class="unit-name">${index + 1}. ${item.name}</div>
                            ${abilityHTML}
                            ${equipmentHTML}
                            ${weaponHTML}
                        </div>
                        
                        <div style="display:flex; flex-direction:column; gap:5px; margin-left:10px; flex-shrink:0; width: 70px;">
                            <div style="display:flex; gap:2px; width: 100%;">
                                <button class="btn-small btn-outline" style="border:1px solid #dcdde1; padding:4px 0; flex:1; background-color:#f8f9fa; color:#2c3e50;" onclick="moveUnitUp('${phase}', ${index})">▲</button>
                                <button class="btn-small btn-outline" style="border:1px solid #dcdde1; padding:4px 0; flex:1; background-color:#f8f9fa; color:#2c3e50;" onclick="moveUnitDown('${phase}', ${index})">▼</button>
                            </div>
                            <div style="display:flex; gap:2px; width: 100%;">
                                <button class="btn-small btn-outline" style="border:none; color:var(--accent-color); padding:4px 0; flex:1;" onclick="editUnitItem('${phase}', ${index})">수정</button>
                                <button class="btn-small btn-outline" style="border:none; color:red; padding:4px 0; flex:1;" onclick="removeUnit('${phase}', ${index})">삭제</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    }

    function removeUnit(phase, index) {
        currentData[phase].splice(index, 1);
        renderUnitsInEdit(phase);
    }

    function saveFaction() {
        const factionName = document.getElementById('factionName').value.trim();
        const factionRule = document.getElementById('factionRule').value.trim(); 
        
        if (!factionName) {
            alert('팩션(팀) 이름을 입력해주세요.');
            return;
        }

        if (editingIndex === -1) {
            const newEntry = {
                id: Date.now(),
                name: factionName,
                rule: factionRule, 
                phases: currentData
            };
            savedFactions.push(newEntry);
        } else {
            savedFactions[editingIndex].name = factionName;
            savedFactions[editingIndex].rule = factionRule; 
            savedFactions[editingIndex].phases = currentData;
        }

        localStorage.setItem(currentGameKey + '_factions', JSON.stringify(savedFactions));
        navTo('screen-list');
    }

    function renderFactionList() {
        const container = document.getElementById('faction-list-container');
        container.innerHTML = '';

        if (savedFactions.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#7f8fa6; margin-top:50px;">저장된 리스트가 없습니다.<br>우측 상단의 + 버튼을 눌러 추가해주세요.</p>';
            return;
        }

        savedFactions.forEach((faction, factionIndex) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const isActive = openFactions.has(factionIndex) ? 'active' : '';
            const iconStr = openFactions.has(factionIndex) ? '▲' : '▼';

            let html = `
                <div class="faction-header" onclick="toggleFactionContent(${factionIndex})">
                    <h3 style="margin:0; white-space: pre-wrap;">${faction.name} <span id="faction-icon-${factionIndex}" style="font-size:14px; margin-left:5px; color:#7f8fa6;">${iconStr}</span></h3>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-small btn-outline" style="border:none; color:#27ae60; padding:5px; font-weight:bold;" onclick="event.stopPropagation(); exportSingleFaction(${factionIndex})">공유</button>
                        <button class="btn-small btn-outline" style="border:none; color:var(--accent-color); padding:5px;" onclick="event.stopPropagation(); editFaction(${factionIndex})">수정</button>
                        <button class="btn-small btn-outline" style="border:none; color:var(--danger-color); padding:5px;" onclick="event.stopPropagation(); deleteFaction(${factionIndex})">삭제</button>
                    </div>
                </div>
                
                <div class="faction-content ${isActive}" id="faction-content-${factionIndex}">
            `;

            if (currentGameKey === 'killteam' && faction.rule) {
                html += `
                    <div class="faction-rule-box">
                        <strong style="color: var(--primary-color); font-size: 14px; display:block; margin-bottom: 4px;">[팩션 룰]</strong>
                        <div style="font-size: 14px; color: var(--text-color); white-space: pre-wrap; word-break: break-all;">${faction.rule}</div>
                    </div>
                `;
            }

            html += `
                    <div style="text-align: right; margin-bottom: 15px;">
                        <button class="btn-small btn-warning" onclick="event.stopPropagation(); resetChecks(${factionIndex})">
                            ⟳ 라운드 리셋 (체크 해제)
                        </button>
                    </div>
            `;

            let hasUnits = false;
            currentPhases.forEach(phase => {
                const units = faction.phases[phase] || [];
                if (units.length > 0) {
                    hasUnits = true;
                    html += `<div style="margin-top:10px; font-weight:bold; color:var(--primary-color); border-bottom:1px solid #eee; padding-bottom:5px;">[${phase}]</div>`;
                    
                    units.forEach((u, unitIndex) => {
                        const checkboxId = `chk-${factionIndex}-${phase}-${unitIndex}`;
                        const isChecked = u.checked ? 'checked' : '';
                        
                        const imgTag = u.image ? `<img src="${u.image}" class="unit-thumb" onclick="event.stopPropagation(); openImageModal('${u.image}')">` : ''; 
                        
                        let abilityHTML = u.ability ? `<div class="unit-ability">${u.ability}</div>` : '';
                        
                        let equipmentHTML = '';
                        let weaponHTML = '';

                        if(currentGameKey === 'killteam' && phase === 'Firefight Phase') {
                            let apArray = u.apAbilities || [];
                            if (u.equipment) apArray.push(u.equipment); 
                            
                            if (apArray.length > 0) {
                                equipmentHTML = apArray.map(ap => `<div class="unit-equipment"><strong style="color: var(--primary-color);">[AP 능력]</strong> ${ap}</div>`).join('');
                            }
                            
                            let wepArray = u.weapons || [];
                            if(u.wepName || u.wepAtk || u.wepHit || u.wepDmg || u.wepWr) {
                                wepArray.push({type: u.wepType||'🔫', name: u.wepName, atk: u.wepAtk, hit: u.wepHit, dmg: u.wepDmg, wr: u.wepWr});
                            }

                            if (wepArray.length > 0) {
                                weaponHTML = `
                                    <div class="weapon-table">
                                        <div class="weapon-table-header">
                                            <div></div><div>Name</div><div>ATK</div><div>HIT</div><div>DMG</div><div>WR</div>
                                        </div>
                                        ${wepArray.map(w => `
                                        <div class="weapon-table-row">
                                            <div style="font-size:16px;">${w.type || '🔫'}</div>
                                            <div style="font-weight:bold; text-align:left; padding-left:4px;">${w.name || '-'}</div>
                                            <div>${w.atk || '-'}</div>
                                            <div>${w.hit || '-'}</div>
                                            <div>${w.dmg || '-'}</div>
                                            <div style="font-size:11px;">${w.wr || '-'}</div>
                                        </div>
                                        `).join('')}
                                    </div>
                                `;
                            }
                        }

                        html += `
                            <div class="unit-item" onclick="event.stopPropagation()">
                                <input type="checkbox" class="unit-checkbox" id="${checkboxId}" ${isChecked} onchange="toggleCheck(${factionIndex}, '${phase}', ${unitIndex}, this.checked)">
                                ${imgTag}
                                <div class="unit-details">
                                    <label for="${checkboxId}" class="unit-name">${unitIndex + 1}. ${u.name}</label>
                                    ${abilityHTML}
                                    ${equipmentHTML}
                                    ${weaponHTML}
                                </div>
                            </div>
                        `;
                    });
                }
            });

            if(!hasUnits && (!faction.rule || currentGameKey !== 'killteam')) {
                html += `<p style="text-align:center; color:#7f8fa6; font-size:14px;">저장된 유닛/능력이 없습니다.</p>`;
            }

            html += `</div>`; 
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    function toggleCheck(factionIndex, phase, unitIndex, isChecked) {
        savedFactions[factionIndex].phases[phase][unitIndex].checked = isChecked;
        localStorage.setItem(currentGameKey + '_factions', JSON.stringify(savedFactions));
    }

    function resetChecks(factionIndex) {
        if(confirm('이 리스트의 모든 체크를 초기화하여 다음 라운드를 준비하시겠습니까?')) {
            currentPhases.forEach(phase => {
                if(savedFactions[factionIndex].phases[phase]) {
                    savedFactions[factionIndex].phases[phase].forEach(u => u.checked = false);
                }
            });
            localStorage.setItem(currentGameKey + '_factions', JSON.stringify(savedFactions));
            renderFactionList();
        }
    }

    function deleteFaction(index) {
        if(confirm('이 리스트를 삭제하시겠습니까?')) {
            savedFactions.splice(index, 1);
            localStorage.setItem(currentGameKey + '_factions', JSON.stringify(savedFactions));
            openFactions.clear(); 
            renderFactionList();
        }
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('Service worker registered!', reg);
            }).catch(err => {
                console.log('Service worker registration failed:', err);
            });
        });
    }
</script>
